name: Opera GX Mobile Rewards Hub

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:    { description: "Runtime (max 120)", required: false, default: "60" }
      ngrok_token:        { description: "Paste your free Ngrok Auth Token", required: true }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  rewards-engine:
    runs-on: windows-latest
    timeout-minutes: 130

    steps:
      - name: Parse Runtime
        run: |
          $runtime = [int]"${{ inputs.runtime_minutes }}"
          if ($runtime -gt 120 -or $runtime -lt 1) { $runtime = 60 }
          "RUNTIME_MINUTES=$runtime" | Out-File -Append $env:GITHUB_ENV

      - name: Download & Extract Clean Tools
        run: |
          Write-Host "Downloading background-friendly environment components..."
          # 1. Download TightVNC
          Invoke-WebRequest -Uri "https://www.tightvnc.com/download/2.8.85/tightvnc-2.8.85-gpl-setup-64bit.msi" -OutFile "$env:TEMP\vnc.msi"
          
          # 2. Download Ngrok 
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/b34ba2s8vaM/ngrok-stable-windows-amd64.zip" -OutFile "$env:TEMP\ngrok.zip"
          Expand-Archive -Path "$env:TEMP\ngrok.zip" -DestinationPath "$env:TEMP\ngrok" -Force
          
          # 3. Download Pre-Extracted Portable Opera GX Build
          Invoke-WebRequest -Uri "https://github.com/tusharpop553-afk/OperaGX-RDP/releases/download/v1.0/AweSun_Setup.exe" -OutFile "$env:TEMP\AweSun_Setup.exe"

      - name: Install VNC Server with Embedded Password
        run: |
          Write-Host "Installing display layout engine..."
          # Pass explicit installation properties to set the access passwords automatically in the backend
          $msiArgs = @(
              "/i", "`"$env:TEMP\vnc.msi`"",
              "/quiet", "/norestart",
              "SET_USEVNCAUTHENTICATION=1",
              "VALUE_OF_USEVNCAUTHENTICATION=1",
              "SET_PASSWORD=1",
              "VALUE_OF_PASSWORD=ViewerPassword123",
              "SET_USECONTROLAUTHENTICATION=1",
              "VALUE_OF_CONTROLPASSWORD=ViewerPassword123"
          )
          
          Start-Process msiexec.exe -ArgumentList $msiArgs -Wait
          
          # Restart the service to make sure the newly injected registry keys take effect
          Restart-Service -Name "tvnserver" -Force -ErrorAction SilentlyContinue
          Write-Host "Display driver active with pre-configured password protection."

      - name: Establish Viewer Tunnel Link
        env:
          NGROK_AUTH: ${{ inputs.ngrok_token }}
        run: |
          Write-Host "Initializing secure public routing map..."
          & "$env:TEMP\ngrok\ngrok.exe" authtoken $env:NGROK_AUTH
          
          # Start a TCP tunnel targeting the default TightVNC port (5900)
          Start-Process -FilePath "$env:TEMP\ngrok\ngrok.exe" -ArgumentList "tcp 5900"
          Start-Sleep -Seconds 6
          
          # Fetch the public connection string for your viewers
          $api = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
          $publicUrl = $api.tunnels[0].public_url
          
          Write-Host "=========================================================="
          Write-Host "MOBILE VIEWERS CONNECTION DETAILS:"
          Write-Host "1. Download a free VNC Viewer app on your phone."
          Write-Host "2. Connect to this Address: $publicUrl"
          Write-Host "3. Use Password: ViewerPassword123"
          Write-Host "=========================================================="
          
          "VIEW_URL=$publicUrl" | Out-File -Append $env:GITHUB_ENV

      - name: Keep-Alive Infrastructure Engine
        run: |
          $mins = [int]$env:RUNTIME_MINUTES
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host "Rewards Session Active | Connect via: $env:VIEW_URL | Ending at " $end.ToString("HH:mm:ss")
            Start-Sleep -Seconds 60
          }
