name: Cloud PC + RustDesk + Opera GX (Screenshot ID Capture)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      RUSTDESK_PASS: Pass@1234
      RUNTIME_MINUTES: 180

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          Write-Host "Purging pre-installed desktop icons and non-essential software..."
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) {
              if (Test-Path "$publicDesktop\$target") { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }
              if (Test-Path "$userDesktop\$target") { Remove-Item "$userDesktop\$target" -Force -ErrorAction SilentlyContinue }
          }

      - name: Download and Force Install RustDesk Client
        run: |
          Write-Host "Fetching RustDesk Executable Layout from GitHub Mirror..."
          $url = "https://github.com/rustdesk/rustdesk/releases/download/1.3.1/rustdesk-1.3.1-x86_64.exe"
          $dst = "$env:TEMP\RustDeskSetup.exe"
          
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $url -OutFile $dst -UserAgent "Mozilla/5.0"
          
          Write-Host "Executing silent compilation and physical system deployment..."
          # Crucial fix: --install forces it to create the 'C:\Program Files\RustDesk' directory structure
          Start-Process $dst -ArgumentList "--install" -Wait
          Start-Sleep -Seconds 10
          Remove-Item $dst -ErrorAction SilentlyContinue

      - name: Configure Unattended Security Password & Connection Profile
        run: |
          Write-Host "Injecting security connection keys into the execution instance..."
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          
          if (Test-Path $rdExe) {
              # Pass password direct to installed binary to match System contexts
              Start-Process -FilePath $rdExe -ArgumentList "--password", "${{ env.RUSTDESK_PASS }}" -Wait
          } else {
              Write-Error "CRITICAL: RustDesk binary not found in Program Files!"
              exit 1
          }
          
          New-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableUIADesktopToggle" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          
          $path = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
          Set-ItemProperty -Path $path -Name "TaskbarGlomLevel" -Value 0 -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

      - name: Minimize Running Infrastructure Windows
        run: |
          Write-Host "Sending active command prompt windows to the taskbar tray..."
          $shell = New-Object -ComObject Shell.Application
          $shell.MinimizeAll()

      - name: Optimize Resolution for Mobile Display
        run: |
          Write-Host "Forcing resolution calibration matrix..."
          Set-DisplayResolution -Width 1280 -Height 720 -Force -ErrorAction SilentlyContinue

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Write-Host "Fetching consumer-stable Opera GX Core..."
          $url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          
          Start-Process -FilePath $installer -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0", "--desktopshortcut=1" -Wait
          
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          if (Test-Path "$userDesktop\Opera GX.lnk") {
              Move-Item -Path "$userDesktop\Opera GX.lnk" -Destination $publicDesktop -Force -ErrorAction SilentlyContinue
          }
          
          $operaExe = "$env:ProgramFiles\Opera GX\opera.exe"
          if (-not (Test-Path $operaExe)) { $operaExe = "$env:ProgramFiles (x86)\Opera GX\opera.exe" }
          
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("$publicDesktop\Opera GX Browser.lnk")
          $Shortcut.TargetPath = $operaExe
          $Shortcut.Arguments = "https://www.opera.com/gx/forsaken --no-first-run --enable-features=GXRewards,GXRewardsSidebarItem --with-feature:gx-rewards=1"
          $Shortcut.Save()

      - name: Launch RustDesk GUI & Upload ID Screenshot
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          Write-Host "Launching RustDesk interface to generate visual ID..."
          Start-Process -FilePath $rdExe -ErrorAction SilentlyContinue
          
          # Give RustDesk a 15-second grace period to connect to servers and display the ID on screen
          Write-Host "Waiting for ID generation matrix to stabilize..."
          Start-Sleep -Seconds 15
          
          $screenshotPath = "$env:TEMP\rustdesk_display.png"
          
          Write-Host "Snapping screen frame..."
          Add-Type -AssemblyName System.Windows.Forms, System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $bitmap.Save($screenshotPath, [System.Drawing.Imaging.ImageFormat]::Png)
          $graphics.Dispose(); $bitmap.Dispose()
          
          Write-Host "Uploading frame map to Telegraph..."
          try {
              $upload = curl.exe -s -F "file=@$screenshotPath" https://telegra.ph/upload
              if ($upload -match '"src":"([^"]+)"') {
                  $cleanUrl = "https://telegra.ph" + $Matches[1]
                  "SCREENSHOT_URL=$cleanUrl" | Out-File -Append $env:GITHUB_ENV
                  
                  $ESC = [char]27
                  Write-Host "${ESC}[32m====================================================${ESC}[0m"
                  Write-Host "${ESC}[36m   CLICK THE LINK BELOW TO VIEW YOUR RUSTDESK ID    ${ESC}[0m"
                  Write-Host "${ESC}[32m====================================================${ESC}[0m"
                  Write-Host "${ESC}[33m WEB LINK : ${ESC}[31m$cleanUrl${ESC}[0m"
                  Write-Host "${ESC}[32m====================================================${ESC}[0m"
              } else {
                  Write-Warning "Telegraph upload failed. Response text: $upload"
              }
          } catch {
              Write-Host "CDN Upload sequence error: $($_.Exception.Message)"
          }

      - name: Keep alive
        run: |
          $mins = [int]"${{ env.RUNTIME_MINUTES }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host ("Cloud PC Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " | Active until " + $end.ToString("HH:mm:ss") + " | RS URL: $env:SCREENSHOT_URL")
            Start-Sleep -Seconds 60
          }
